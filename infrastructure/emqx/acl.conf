%%--------------------------------------------------------------------
%% MDM System MQTT ACL Rules
%%--------------------------------------------------------------------
%% ACL rules for device and server communication
%%
%% Rule format:
%% {allow|deny, who, access, topics}.
%%
%% who: all | {user, "username"} | {client, "clientid"} | {ipaddr, "ip/mask"}
%% access: subscribe | publish | pubsub
%% topics: list of topic filters
%%--------------------------------------------------------------------

%% Server can publish and subscribe to all topics
{allow, {user, "mdm_server"}, pubsub, ["#"]}.

%% Devices can publish to their own telemetry/response/events topics
%% Pattern: devices/{device_id}/telemetry
{allow, all, publish, ["devices/+/telemetry", "devices/+/responses", "devices/+/events"]}.

%% Devices can subscribe to their own command topic
{allow, all, subscribe, ["devices/+/commands"]}.

%% Devices can subscribe to broadcast topics
{allow, all, subscribe, ["broadcast/#"]}.

%% Devices can subscribe to their group commands
{allow, all, subscribe, ["groups/+/commands"]}.

%% Dashboard clients can subscribe to real-time updates
{allow, {user, "mdm_dashboard"}, subscribe, ["dashboard/#", "devices/#"]}.

%% Deny all other access by default
{deny, all}.
